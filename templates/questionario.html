<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Registrar Sintomas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    /* Main container */
    .container {
      max-width: 800px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    .form-title {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      text-align: center;
      color: var(--primary-color);
    }

    .form-group {
      margin-bottom: var(--spacing);
    }

    label {
      display: block;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    input[type="checkbox"] {
      accent-color: var(--primary-color);
      margin-right: 0.5rem;
    }

    /* Grid for symptom checkboxes */
    .symptom-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--spacing);
      margin-bottom: var(--spacing);
    }

    input[type="date"],
    input[type="time"],
    select,
    textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
    }



    .btn {
      padding: 0.75rem 1.5rem;
      background-color: #0056b3;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #0056b3;
    }
  </style>
  
</head>
<body>

<!-- Barra de Navegação -->
<nav class="navbar">
  <div class="logo">
    <img src="{{ url_for('static', filename='img/Logo.jpg') }}" alt="Logo">
    <span>TCC Asmatic</span>
  </div>
  <ul class="nav-links">
    <li><a href="/insights">Insights</a></li>
    <li><a href="/sensores">Sensores</a></li>
    <li><a href="/" class="active">Painel</a></li>
    <li><a href="/chat">Assistente IA</a></li>
    <li><a href="/configuracoes">Configurações</a></li>
  </ul>
</nav>

<!-- Conteúdo Principal -->
<main class="container">
  <h1 class="form-title">Registrar Sintomas Respiratórios</h1>

  <form action="/salvar_sintomas" method="POST">

    <div class="form-group">
      <label>Selecione os sintomas presentes:</label>
      <div class="symptom-grid">
        <!-- Cada sintoma em card simples -->
        <div>
          <input type="hidden" name="Tiredness" value="0">
          <input type="checkbox" id="Tiredness" name="Tiredness" value="1">
          <label for="Tiredness">Cansaço</label>
        </div>

        <div>
          <input type="hidden" name="Dry-Cough" value="0">
          <input type="checkbox" id="Dry-Cough" name="Dry-Cough" value="1">
          <label for="Dry-Cough">Tosse seca</label>
        </div>

        <div>
          <input type="hidden" name="Difficulty-in-Breathing" value="0">
          <input type="checkbox" id="Difficulty-in-Breathing" name="Difficulty-in-Breathing" value="1">
          <label for="Difficulty-in-Breathing">Dificuldade de respirar</label>
        </div>

        <div>
          <input type="hidden" name="Sore-Throat" value="0">
          <input type="checkbox" id="Sore-Throat" name="Sore-Throat" value="1">
          <label for="Sore-Throat">Dor de garganta</label>
        </div>

        <div>
          <input type="hidden" name="None_Sympton" value="0">
          <input type="checkbox" id="None_Sympton" name="None_Sympton" value="1">
          <label for="None_Sympton">Sem sintomas principais</label>
        </div>

        <div>
          <input type="hidden" name="Pains" value="0">
          <input type="checkbox" id="Pains" name="Pains" value="1">
          <label for="Pains">Dores</label>
        </div>

        <div>
          <input type="hidden" name="Nasal-Congestion" value="0">
          <input type="checkbox" id="Nasal-Congestion" name="Nasal-Congestion" value="1">
          <label for="Nasal-Congestion">Congestão nasal</label>
        </div>

        <div>
          <input type="hidden" name="Runny-Nose" value="0">
          <input type="checkbox" id="Runny-Nose" name="Runny-Nose" value="1">
          <label for="Runny-Nose">Coriza</label>
        </div>

        <div>
          <input type="hidden" name="None_Experiencing" value="0">
          <input type="checkbox" id="None_Experiencing" name="None_Experiencing" value="1">
          <label for="None_Experiencing">Sem sintomas em curso</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <button type="submit" class="btn">Enviar</button>
    </div>

  </form>


</main>

<script>
  document.querySelector('form').addEventListener('submit', function(event) {
      var now = new Date();
      
      // Formatar a data como YYYY-MM-DD
      var year = now.getFullYear();
      var month = String(now.getMonth() + 1).padStart(2, '0'); // Meses são de 0 a 11
      var day = String(now.getDate()).padStart(2, '0');
      var formattedDate = `${year}-${month}-${day}`;
      
      // Formatar a hora como HH:MM
      var hours = String(now.getHours()).padStart(2, '0');
      var minutes = String(now.getMinutes()).padStart(2, '0');
      var formattedTime = `${hours}:${minutes}`;
      
      // Preencher os campos de data e hora
      document.getElementById('data').value = formattedDate;
      document.getElementById('hora').value = formattedTime;
  });
</script>

</body>
</html>
